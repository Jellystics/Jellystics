version: '3'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  # ── Setup ─────────────────────────────────────────────────────────────────

  setup:
    desc: Create backend-v2/.env with default values if it does not exist
    cmds:
      - |
        if [ ! -f backend-v2/.env ]; then
          cp backend-v2/.env.example backend-v2/.env
          echo "backend-v2/.env created — edit it before running"
        else
          echo "backend-v2/.env already exists"
        fi

  install:
    desc: Install frontend dependencies
    cmds:
      - pnpm install --dir frontend

  # ── Database ──────────────────────────────────────────────────────────────

  db:
    desc: Start PostgreSQL 18 container
    cmds:
      - docker compose up -d jellystics-db
      - echo "Waiting for PostgreSQL to be ready..."
      - docker compose exec jellystics-db sh -c 'until pg_isready -U postgres; do sleep 1; done'
      - echo "PostgreSQL is ready"

  db:stop:
    desc: Stop the PostgreSQL container
    cmds:
      - docker compose stop jellystics-db

  db:logs:
    desc: Tail PostgreSQL container logs
    cmds:
      - docker compose logs -f jellystics-db

  # ── Backend (Go) ──────────────────────────────────────────────────────────

  backend:
    desc: Start Go backend in dev mode
    dir: backend-v2
    cmds:
      - go run ./cmd/server

  backend:build:
    desc: Build Go backend binary
    dir: backend-v2
    cmds:
      - go build -o ../dist/jellystics ./cmd/server

  backend:test:
    desc: Run Go unit tests
    dir: backend-v2
    cmds:
      - go test ./...

  backend:tidy:
    desc: Run go mod tidy
    dir: backend-v2
    cmds:
      - go mod tidy

  # ── Frontend ──────────────────────────────────────────────────────────────

  frontend:
    desc: Start frontend dev server
    dir: frontend
    cmds:
      - pnpm dev

  frontend:build:
    desc: Build frontend for production
    dir: frontend
    cmds:
      - pnpm build

  # ── Production build ──────────────────────────────────────────────────────

  build:
    desc: Build production binary with frontend embedded
    cmds:
      - task: frontend:build
      - mkdir -p backend-v2/internal/assets/web
      - cp -r frontend/dist/. backend-v2/internal/assets/web/
      - task: backend:build
      - echo "Binary at dist/jellystics"

  # ── Cleanup ───────────────────────────────────────────────────────────────

  clean:
    desc: Stop and remove DB container and volumes
    cmds:
      - docker compose down -v --remove-orphans
      - echo "DB cleaned"

  clean:all:
    desc: Remove DB + build artifacts + node_modules
    cmds:
      - task: clean
      - rm -rf frontend/node_modules frontend/dist
      - rm -rf dist
      - rm -f backend-v2/internal/assets/web/*
      - echo "Full clean done"
